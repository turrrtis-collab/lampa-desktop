name: Build And Publish App
on:
  push:
    branches:
      - main

jobs:
  publish-x32-win32:
    name: Publish x32 and x64 for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Set version
        run: npm --no-git-tag-version version 1.5.${{ github.run_number }}

      - name: Publish x32 for Windows
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish-x32-win32

      - name: Publish x64 for Windows
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish-x64-win32

  publish-x64-linux:
    name: Publish x64 for Linux
    runs-on: ubuntu-latest
    needs: publish-x32-win32
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Set version
        run: npm --no-git-tag-version version 1.5.${{ github.run_number }}

      - name: Publish x64 for Linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish-x64-linux
